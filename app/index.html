                  clearBottomPct: Math.min(100, Math.max(...brokerTextItems.map(t => t.yPct)) + 4),
                  clearLeftPct: altLine.xStartPct, clearRightPct: altLine.xEndPct,
                  isFullWidth: altLine.widthPct >= 90, line: altLine
                };
              }
            } else if (altLine && altLine.widthPct >= 50) {
              // ラインが見つかったがボックスより上 → 全幅ラインならラインを採用
              brokerLine = altLine;
              brokerBox = null;
              clearRegion = {
                detected: true, method: 'line',
                clearTopPct: altLine.yPct, clearBottomPct: 100,
                clearLeftPct: 0, clearRightPct: 100,
                isFullWidth: altLine.widthPct >= 90, line: altLine
              };
            } else {
              // テキスト検出のほうがページ下部を指していないか確認
              if (text.topPct > boxTopPct + 5) {
                brokerBox = null;
              } else if (brokerBox.wPct < 60) {
                // 非常に狭いボックス（< 60%）→ 無条件で無効化
                brokerBox = null;
              }
            }
          } else if (brokerBox.wPct < 60) {
            // テキスト未検出でも非常に狭いボックスは無効化
            brokerBox = null;
          }
        }

        // ボックスが有効な場合のみclearRegionを設定
        if (brokerBox && !clearRegion) {
          clearRegion = {
            detected: true,
            method: obiType === 'normal' ? 'box' : (obiType === 'irregular' ? 'box_irregular' : 'box'),
            clearTopPct: boxTopPct,
            clearBottomPct: boxBottomPct,
            clearLeftPct: brokerBox.xPct,
            clearRightPct: brokerBox.xPct + brokerBox.wPct,
            isFullWidth: brokerBox.wPct >= 90,
            box: brokerBox
          };
        }
      }

      // Step 4: ボックスがないか無効化された → ライン検出（テキストあり）
      // ※ brokerBoxが部分幅チェックで無効化された場合もここに到達する
      if (!clearRegion && text.found && brokerTextItems.length > 0) {
        brokerLine = findBrokerLine(paths.hLines, brokerTextItems);

        // ガード: ライン位置が上部66%より上にある場合は採用しない（物件テーブルのボーダー誤検知防止）
        if (brokerLine && brokerLine.yPct < 66) {
          console.log('[detectObiRegion] ライン位置が上部すぎるためスキップ:', brokerLine.yPct);
          brokerLine = null;
        }

        if (brokerLine) {
          if (obiType === 'normal') {
            clearRegion = {
              detected: true,
              method: 'line',
              clearTopPct: brokerLine.yPct,
              clearBottomPct: 100,
              clearLeftPct: 0,
              clearRightPct: 100,
              isFullWidth: true,
              line: brokerLine
            };
          } else {
            clearRegion = {
              detected: true,
              method: 'line_irregular',
              clearTopPct: brokerLine.yPct,
              clearBottomPct: Math.min(100, Math.max(...brokerTextItems.map(t => t.yPct)) + 4),
              clearLeftPct: brokerLine.xStartPct,
              clearRightPct: brokerLine.xEndPct,
              isFullWidth: brokerLine.widthPct >= 90,
              line: brokerLine
            };
          }
        }

        // ライン不採用でも、テキストクラスタが強スコア（≥10）かつ下部（≥70%）にある場合は直接採用
        if (!clearRegion && text.clusterScore >= 10 && text.topPct >= 70) {
          clearRegion = {
            detected: true,
            method: 'text_cluster',
            clearTopPct: Math.max(55, text.topPct - 1.5),
            clearBottomPct: text.botPct ? Math.min(100, text.botPct + 1.0) : 100,
            clearLeftPct: 0,
            clearRightPct: 100,
            isFullWidth: true
          };
        }
      }

      if (!clearRegion && !text.found && paths.hLines.length > 0) {
        // Step 4b: テキスト検出なし → 下部の水平ラインで業者帯を推定
        // 下部70%以降にある幅広いラインを探す
        const lowerLines = paths.hLines.filter(l => l.yPct >= 70 && l.widthPct >= 50);
        if (lowerLines.length > 0) {
          lowerLines.sort((a, b) => a.yPct - b.yPct);
          const lineY = lowerLines[0].yPct;

          // まずテキストアイテムで業者キーワードを確認
          const lowerTexts = allTextItems.filter(t => t.yPct >= lineY - 2 && t.yPct <= 100);
          let hasBrokerKw = false;
          for (const t of lowerTexts) {
            const s = t.str;
            if (ANCHOR_STRONG.some(k => s.includes(k)) ||
              ANCHOR_MEDIUM.some(k => s.includes(k)) ||
              BROKER_KW.some(k => s.includes(k))) {
              hasBrokerKw = true;
              break;
            }
          }

          // テキストアイテムが空の場合（画像PDF）→ OCRでライン下を確認
          if (!hasBrokerKw && allTextItems.length < 5 && renderedCanvas) {
            const ocrBelow = await ocrRegion(renderedCanvas, Math.max(0, lineY - 2), 100);
            if (ocrBelow && ocrBelow.hasBrokerInfo) {
              hasBrokerKw = true;
            }
          }

          if (hasBrokerKw) {
            brokerLine = lowerLines[0];
            clearRegion = {
              detected: true,
              method: 'line',
              clearTopPct: brokerLine.yPct,
              clearBottomPct: 100,
              clearLeftPct: 0,
              clearRightPct: 100,
              isFullWidth: brokerLine.widthPct >= 90,
              line: brokerLine
            };
          }
        }
      }

      // --- Step 5: 上記で境界が決まらない場合のフォールバック ---
      if (!clearRegion && text.found) {
        // テキストベースの従来方式
        let clearTopPct = text.topPct;
        let method = 'text';

        if (logos.found && logos.topPct < clearTopPct && logos.topPct >= 70) {
          clearTopPct = logos.topPct;
          method = 'text+logo';
        }
        if (images.found && images.topPct < clearTopPct && images.topPct >= clearTopPct - 15) {
          clearTopPct = images.topPct;
          method += '+img';
        }

        clearTopPct = Math.max(55, Math.min(95, clearTopPct - 1.5));
        const clearBotPct = text.botPct ? Math.min(100, text.botPct + 1.0) : 100;
        clearRegion = {
          detected: true,
          method,
          clearTopPct,
          clearBottomPct: clearBotPct,
          clearLeftPct: 0,
          clearRightPct: 100,
          isFullWidth: true
        };

      } else if (!clearRegion && (logos.found || images.found || (pixel.found && pixel.boundaryPct > 75))) {
        let clearTopPct = logos.found ? logos.topPct : images.found ? images.topPct : pixel.boundaryPct;
        let method = logos.found ? 'logo' : images.found ? 'image' : 'pixel';
        clearTopPct = Math.max(58, Math.min(95, clearTopPct - 1.5));
        clearRegion = {
          detected: true,
          method,
          clearTopPct,
          clearBottomPct: 100,
          clearLeftPct: 0,
          clearRightPct: 100,
          isFullWidth: true
        };
      }

      // --- Step 5.5: 中央帯検出（2段組マイソク対応） ---
      // 上下2段に物件情報が配置され、中央に業者帯があるレイアウト
      // ピクセル帯検出より先に実行（ピクセル帯が下部を先に拾って中央帯が検出されない問題を防止）
      if (!clearRegion) {
        const midBand = detectMidPageBand(renderedCanvas);
        if (midBand.found) {
          const isImgPage = isImageBasedPage(tc);

          if (isImgPage) {
            // 画像ベースPDF → OCRで業者キーワードを確認
            const ocrMid = await ocrRegion(renderedCanvas,
              Math.max(0, midBand.topPct - 2), Math.min(100, midBand.bottomPct + 2));
            if (ocrMid && ocrMid.hasBrokerInfo) {
              clearRegion = {
                detected: true,
                method: 'mid_band',
                clearTopPct: midBand.topPct,
                clearBottomPct: midBand.bottomPct,
                clearLeftPct: 0,
                clearRightPct: 100,
                isFullWidth: true,
                ocrResult: ocrMid
              };
              obiType = 'mid_band';
            }
          } else {
            // テキストPDF → 帯領域内にブローカーキーワードがあるかチェック
            const bandTexts = allTextItems.filter(t =>
              t.yPct >= midBand.topPct - 2 && t.yPct <= midBand.bottomPct + 2);
            const hasBrokerKw = bandTexts.some(t => {
              const s = t.str || t.text || '';
              return ANCHOR_STRONG.some(k => s.includes(k)) ||
                ANCHOR_MEDIUM.some(k => s.includes(k)) ||
                BROKER_KW.some(k => s.includes(k)) ||
                /\d{2,4}[-\s]?\d{2,4}[-\s]?\d{3,4}/.test(s);
            });
            if (hasBrokerKw) {
              clearRegion = {
                detected: true,
                method: 'mid_band',
                clearTopPct: midBand.topPct,
                clearBottomPct: midBand.bottomPct,
                clearLeftPct: 0,
                clearRightPct: 100,
                isFullWidth: true
              };
              obiType = 'mid_band';
            }
          }
        }
      }

      // --- ピクセルライン＋OCRによる中央帯検出 ---
      // detectMidPageBandが色帯を見つけられない場合（ページ全体が色付きの場合）でも
      // ピクセルラインが中央部（25%〜70%）にあればOCRで確認
      if (!clearRegion && paths.hLines.length > 0) {
        const midLines = paths.hLines.filter(l => l.yPct >= 25 && l.yPct <= 70 && l.widthPct >= 50);
        if (midLines.length > 0 && renderedCanvas) {
          // 最もページ中央に近いラインを選択
          midLines.sort((a, b) => Math.abs(a.yPct - 50) - Math.abs(b.yPct - 50));
          const midLine = midLines[0];
          // ライン周辺をOCRで業者キーワード確認
          const ocrMidLine = await ocrRegion(renderedCanvas,
            Math.max(0, midLine.yPct - 2), Math.min(100, midLine.yPct + 15));
          if (ocrMidLine && ocrMidLine.hasBrokerInfo) {
            clearRegion = {
              detected: true,
              method: 'mid_band',
              clearTopPct: midLine.yPct,
              clearBottomPct: Math.min(100, midLine.yPct + 15),
              clearLeftPct: 0,
              clearRightPct: 100,
              isFullWidth: true,
              ocrResult: ocrMidLine,
              line: midLine
            };
            obiType = 'mid_band';
            // OCRワード位置で下端を絞り込む
            if (ocrMidLine.brokerMinYPct != null) {
              // 業者KWの最下位 + 3%マージンを下端にする
              const words = [];
              // brokerMinYPctは最上位なので、下端は別途計算が必要
              // ここではOCR範囲の下端をそのまま使う
            }
          }
        }
      }

      // --- 画像ベースPDF中央帯OCRフォールバック ---
      // ページ全体が暗い背景（ARNEST ONE等）で色帯も水平ラインも見つからない場合、
      // 中央部（35%〜65%）を直接OCRして業者キーワードを探す
      if (!clearRegion && renderedCanvas) {
        const isImgPage = isImageBasedPage(tc);
        if (isImgPage) {
          const ocrMidDirect = await ocrRegion(renderedCanvas, 35, 65);
          if (ocrMidDirect && ocrMidDirect.hasBrokerInfo && ocrMidDirect.matchCount >= 2) {
            // 業者キーワードが2件以上見つかった → 中央帯として採用
            let midTop = 35;
            let midBottom = 65;
            // OCRワード位置でゾーンを絞り込む
            if (ocrMidDirect.brokerMinYPct != null) {
              midTop = Math.max(25, ocrMidDirect.brokerMinYPct - 3);
              midBottom = Math.min(75, ocrMidDirect.brokerMinYPct + 15);
            }
            clearRegion = {
              detected: true,
              method: 'mid_band',
              clearTopPct: midTop,
              clearBottomPct: midBottom,
              clearLeftPct: 0,
              clearRightPct: 100,
              isFullWidth: true,
              ocrResult: ocrMidDirect
            };
            obiType = 'mid_band';
          }
        }
      }

      // --- ピクセル帯検出フォールバック ---
      // 1. clearRegionが未設定の場合
      // 2. clearRegionが設定済みでもゾーンが小さすぎる場合（高さ<12%）
      //    → 基本ピクセル検出が95%等の極小ゾーンしか返さなかった場合の補正
      const zoneHeight = clearRegion ? (clearRegion.clearBottomPct - clearRegion.clearTopPct) : 0;
      const zoneTooSmall = clearRegion && zoneHeight < 12 &&
        (clearRegion.method === 'pixel' || clearRegion.method === 'image' || clearRegion.method === 'pixel_edge');
      if (!clearRegion || zoneTooSmall) {
        const isImgPage = isImageBasedPage(tc);
        const pixelBand = detectObiBandByPixels(renderedCanvas);

        if (pixelBand.found) {
          // ピクセルで帯境界を発見
          if (isImgPage) {
            // 画像ベース → OCRで業者情報か確認
            // まずピクセル帯領域でOCR
            let ocrResult = await ocrLowerRegion(renderedCanvas, pixelBand.topPct);
            let confirmed = ocrResult && ocrResult.hasBrokerInfo;
            let effectiveTop = pixelBand.topPct;

            // ピクセル帯だけでは業者情報が見つからない場合、
            // 帯の上に白背景の業者テキストがある可能性 → 上に10%拡張してOCR
            if (!confirmed) {
              const expandedTop = Math.max(55, pixelBand.topPct - 10);
              const ocrExpanded = await ocrLowerRegion(renderedCanvas, expandedTop);
              if (ocrExpanded && ocrExpanded.hasBrokerInfo) {
                ocrResult = ocrExpanded;
                confirmed = true;
                effectiveTop = expandedTop;
              }
            }
            // OCR確認済みで帯が大きい場合、OCRワード位置でゾーンを絞り込む
            // 例: ピクセル帯80%~100%だが業者KWは93%~100% → 93%に絞る
            if (confirmed && ocrResult && ocrResult.brokerMinYPct != null) {
              const bandHeight = (pixelBand.bottomPct || 100) - effectiveTop;
              if (bandHeight > 15 && ocrResult.brokerMinYPct > effectiveTop + 3) {
                // 業者KW位置の少し上（3%マージン）を新しい上端にする
                effectiveTop = Math.max(effectiveTop, ocrResult.brokerMinYPct - 3);
              }
            }

            // 画像ベースPDFではOCR確認で判定を分岐
            const ocrMatchCount = ocrResult ? ocrResult.matchCount : 0;

            if (confirmed) {
              // OCR完全確認（2件以上）→ 確定採用
              clearRegion = {
                detected: true,
                method: 'ocr_band',
                clearTopPct: effectiveTop,
                clearBottomPct: pixelBand.bottomPct || 100,
                clearLeftPct: 0,
                clearRightPct: 100,
                isFullWidth: true,
                ocrResult: ocrResult
              };
            } else if (ocrMatchCount >= 1 && zoneTooSmall && pixelBand.heightPct >= 5 && pixelBand.heightPct <= 35) {
              // OCR部分確認（1件）+ 既存ゾーンが極小 + ピクセル帯が妥当サイズ
              // → 元の極小ゾーン（96%~100%等）よりピクセル帯のほうが正確
              clearRegion = {
                detected: true,
                method: 'pixel_band',
                clearTopPct: effectiveTop,
                clearBottomPct: pixelBand.bottomPct || 100,
                clearLeftPct: 0,
                clearRightPct: 100,
                isFullWidth: true,
                ocrResult: ocrResult
              };
            }
            // OCR 0件の場合はclearRegionを設定しない → 後続のフォールバックへ
          } else {
            // テキスト付きPDF → 帯内にキーワードがあるかテキストでチェック
            // pdf.jsのviewport高さを使って正確なY%を計算
            const vp = page.getViewport({ scale: 1 });
            const vpH = vp.height;
            // ピクセル帯の上下に5%マージンで検索（テキスト座標ずれ対応）
            const searchTop = Math.max(0, pixelBand.topPct - 5);
            const searchBottom = Math.min(100, (pixelBand.bottomPct || 100) + 2);
            const bandItems = (tc.items || []).filter(item => {
              const str = (item.str || '').trim();
              if (str.length < 2) return false;
              const yFromTop = item.transform ? (1 - item.transform[5] / vpH) * 100 : 100;
              return yFromTop >= searchTop && yFromTop <= searchBottom;
            });
            const brokerKws = ['TEL', 'FAX', 'tel', 'fax', '免許', '不動産', '株式会社', '有限会社', '（株）', '(株)',
              '宅地建物', '仲介', '媒介', '建設', 'ホーム', 'ハウス', 'リアル', 'エステート', 'プロパティ',
              '電話', '担当', '問い合わせ', '問合せ', '手数料', '専任', '物件確認',
              '社名', '担当者', '情報提供元', '情報提供'];
            const phoneRe = /\d{2,4}[-\s]?\d{2,4}[-\s]?\d{3,4}/;
            const hasKw = bandItems.some(item => {
              const s = item.str || '';
              return brokerKws.some(kw => s.includes(kw)) || phoneRe.test(s);
            });
            if (hasKw) {
              clearRegion = {
                detected: true,
                method: pixelBand.method || 'pixel_band',
                clearTopPct: pixelBand.topPct,
                clearBottomPct: pixelBand.bottomPct || 100,
                clearLeftPct: 0,
                clearRightPct: 100,
                isFullWidth: true
              };
            } else if (zoneTooSmall && pixelBand.heightPct >= 5 && pixelBand.heightPct <= 35) {
              // テキストKWが見つからなくても、既存ゾーンが極小で
              // ピクセル帯が妥当なサイズなら採用（テキスト座標ずれ対応）
              clearRegion = {
                detected: true,
                method: pixelBand.method || 'pixel_band',
                clearTopPct: pixelBand.topPct,
                clearBottomPct: pixelBand.bottomPct || 100,
                clearLeftPct: 0,
                clearRightPct: 100,
                isFullWidth: true
              };
            }
          }
          if (clearRegion && clearRegion.method && clearRegion.method.startsWith('pixel'))
            obiType = isImgPage ? 'image_based' : (obiType || 'normal');
        }

        // それでも見つからない場合 → 画像ベースなら下部35%をOCR
        if (!clearRegion && isImgPage) {
          const ocrResult = await ocrLowerRegion(renderedCanvas, 65);
          if (ocrResult && ocrResult.hasBrokerInfo) {
            clearRegion = {
              detected: true,
              method: 'ocr_fallback',
              clearTopPct: 65,
              clearBottomPct: 100,
              clearLeftPct: 0,
              clearRightPct: 100,
              isFullWidth: true,
              ocrResult: ocrResult
            };
            obiType = 'image_based';
          }
        }
      }

      // --- 未検出 ---
      if (!clearRegion) {
        return {
          detected: false, method: 'fallback', obiType: obiType || 'none',
          topPct: 90, bottomPct: 100, heightPct: 10,
          clearTopPct: 90, clearBottomPct: 100,
          clearLeftPct: 0, clearRightPct: 100,
          isFullWidth: true,
          hitCount: 0, keywords: [],
          pixelBoundary: pixel.found ? pixel.boundaryPct : null,
          textBoundary: null, imageBoundary: null, logoBoundary: null,
          brokerBox: null, brokerLine: null, pathInfo: paths,
          isImageBased: isImageBasedPage(tc)
        };
      }

      // --- 検出成功: 結果を構築 ---
      return {
        detected: true,
        method: clearRegion.method,
        obiType,
        topPct: clearRegion.clearTopPct,
        bottomPct: clearRegion.clearBottomPct,
        heightPct: clearRegion.clearBottomPct - clearRegion.clearTopPct,
        clearTopPct: clearRegion.clearTopPct,
        clearBottomPct: clearRegion.clearBottomPct,
        clearLeftPct: clearRegion.clearLeftPct || 0,
        clearRightPct: clearRegion.clearRightPct || 100,
        isFullWidth: clearRegion.isFullWidth !== false,
        hitCount: text.found ? text.hitCount : 0,
        keywords: text.found ? text.keywords : [],
        pixelBoundary: pixel.found ? pixel.boundaryPct : null,
        textBoundary: text.found ? text.topPct : null,
        imageBoundary: images.found ? images.topPct : null,
        logoBoundary: logos.found ? logos.topPct : null,
        brokerBox: brokerBox,
        brokerLine: brokerLine,
        pathInfo: paths,
        ocrResult: clearRegion.ocrResult || null,
        isImageBased: isImageBasedPage(tc)
      };
    }

    // ===== 業者情報の検出＆削除 =====
    //
    // 【包含方式】業者パターンに積極的にマッチしたテキストだけを
    // 業者情報として収集する（物件情報の誤削除を防止）。
    // 帯ゾーン全体の白塗りはロゴ・背景帯・QR等の非テキスト要素対策として別途実施。

    function isBrokerMatch(text, fp) {
      // 強アンカー
      if (ANCHOR_STRONG.some(kw => text.includes(kw))) return 'anchor';
      // 中アンカー
      if (ANCHOR_MEDIUM.some(kw => text.includes(kw))) return 'anchor';
      // 業者キーワード
      if (BROKER_KW.some(kw => text.includes(kw))) return 'broker_kw';
      // 電話番号FP
      const itemPhones = extractPhones(text);
      for (const p of itemPhones) {
        if ([...fp.phones].some(fpp => fpp === p || fpp.includes(p) || p.includes(fpp))) return 'phone_fp';
      }
      // 会社名FP（施工会社/分譲会社/管理会社の文脈は除外）
      if (fp.companies.some(c => text.includes(c))) {
        if (!['施工会社', '分譲会社', '管理会社', '施工/', '分譲/', '管理/'].some(ctx => text.includes(ctx))) {
          return 'company_fp';
        }
      }
      // 免許番号FP
      if (fp.licenses.some(l => text.includes(l))) return 'license_fp';
      // Email FP / 直接マッチ
      if (fp.emails.some(e => text.includes(e))) return 'email_fp';
      emailRe.lastIndex = 0;
      if (emailRe.test(text)) return 'email';
      // URL FP
      if (fp.urls.some(u => text.includes(u))) return 'url_fp';
      urlRe.lastIndex = 0;
      if (urlRe.test(text)) return 'url';
      // 郵便番号FP
      if (fp.zipcodes.some(z => text.includes(z))) return 'zipcode_fp';

      return null; // 業者パターンに一致しない
    }

    async function findAllBrokerItems(page) {
      const textContent = await page.getTextContent();
      const viewport = page.getViewport({ scale: 1 });
      const pageHeight = viewport.height;
      const pageWidth = viewport.width;

      // 全テキスト要素を収集（pdf.jsのwidthプロパティも活用）
      const allItems = [];
      for (const item of textContent.items) {
        const text = item.str;
        if (!text || text.trim().length === 0) continue;
        const fontSize = Math.abs(item.transform[3]) || Math.abs(item.transform[0]) || 10;
        const x = item.transform[4];
        const y = item.transform[5];
        const yFromTop = pageHeight - y;
        const rawYPct = (yFromTop / pageHeight) * 100;
        const yPct = Math.min(100, Math.max(0, rawYPct));
        const isOOB = rawYPct > 100 || rawYPct < 0;
        // pdf.jsのwidth情報があればそれを使う（より正確）
        const textWidth = item.width || (text.length * fontSize * 0.6);
        allItems.push({ text, x, y: yFromTop, yPct, rawYPct, fontSize, isOOB, textWidth });
      }

      // detectObiByTextと同じ5フェーズ検出でアンカーと境界を取得
      const textResult = await detectObiByText(page);
      if (!textResult.found) return { brokerItems: [], fingerprint: null, obiBoundaryPct: null };

      const boundary = textResult.topPct - 1.5; // マージン適用
      const fp = textResult.fingerprint;

      // 【包含方式】業者パターンにマッチしたテキストだけを収集
      const brokerItems = [];
      for (const item of allItems) {
        const text = item.text;

        // 境界外かつOOBでもない → スキップ
        if (!item.isOOB && item.yPct < boundary) continue;

        // 業者パターンにマッチするかチェック
        const matchReason = isBrokerMatch(text, fp);
        if (!matchReason) continue; // マッチしない → スキップ（物件情報を保護）

        brokerItems.push({
          x: item.x * RENDER_SCALE,
          y: (item.y - item.fontSize) * RENDER_SCALE,
          w: item.textWidth * RENDER_SCALE,
          h: (item.fontSize + 2) * RENDER_SCALE,
          yPct: item.yPct,
          text: item.text.substring(0, 30),
          reason: matchReason
        });
      }

      return { brokerItems, fingerprint: fp, obiBoundaryPct: boundary };
    }

    // Canvas上で業者情報テキストを個別に白塗り
    function applyBrokerCleanup(ctx, brokerItems) {
      ctx.fillStyle = '#ffffff';
      for (const t of brokerItems) {
        ctx.fillRect(
          Math.max(0, t.x - 3),
          Math.max(0, t.y - 3),
          t.w + 6,
          t.h + 6
        );
      }
    }

    // 帯ゾーンを白塗り（ボックス対応: 左右の範囲も考慮）
    function applyZoneWhiteout(ctx, pageWidth, pageHeight, clearTopPct, clearBottomPct, clearLeftPct, clearRightPct) {
      const clearY = Math.round(pageHeight * clearTopPct / 100);
      const clearH = Math.round(pageHeight * (clearBottomPct - clearTopPct) / 100);
      const clearX = Math.round(pageWidth * (clearLeftPct || 0) / 100);
      const clearW = Math.round(pageWidth * ((clearRightPct || 100) - (clearLeftPct || 0)) / 100);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(clearX, clearY, clearW, clearH);
    }

    // ===== Load PDF =====
    async function loadPDF(file) {
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('loadingState').style.display = 'flex';
      document.getElementById('loadingText').textContent = 'PDF読み込み中...';

      const arrayBuffer = await file.arrayBuffer();
      pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      totalPages = pdfDoc.numPages;
      pdfPages = [];

      let detectedCount = 0;

      // OCRワーカーをバックグラウンドで事前初期化（画像ベースPDF対応）
      initOcrWorker().catch(() => { });

      for (let i = 1; i <= totalPages; i++) {
        document.getElementById('loadingText').textContent =
          `ページ ${i}/${totalPages} を処理中...（帯検出＆レンダリング）`;

        const page = await pdfDoc.getPage(i);

        // Canvas rendering（先にレンダリングしてピクセル解析に使う）
        const viewport = page.getViewport({ scale: RENDER_SCALE });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;

        // 帯自動検出（ピクセル＋テキスト併用）
        const obiRegion = await detectObiRegion(page, canvas);
        if (obiRegion.detected) detectedCount++;

        // 業者情報の検出（帯の内外を問わず下部40%を全スキャン）
        let brokerItems = [];
        let fingerprint = null;

        document.getElementById('loadingText').textContent =
          `ページ ${i}/${totalPages} を処理中...（業者情報検出）`;
        const brokerResult = await findAllBrokerItems(page);
        brokerItems = brokerResult.brokerItems;
        fingerprint = brokerResult.fingerprint;

        pdfPages.push({
          canvas,
          width: viewport.width,
          height: viewport.height,
          enabled: true,
          obiRegion,
          brokerItems,
          fingerprint
        });
      }

      document.getElementById('loadingState').style.display = 'none';

      // 業者情報検出の合計
      const totalCleanup = pdfPages.reduce((s, p) => s + p.brokerItems.length, 0);

      buildThumbnails();
      currentPage = 0;
      showPreview();

      let msg = `${totalPages}ページを読み込みました（${detectedCount}ページで帯を自動検出）`;
      if (totalCleanup > 0) msg += ` / ${totalCleanup}箇所の業者情報を検出`;
      showToast(msg);

      // APIキーが有効ならAI検出ボタンを表示
      if (apiKeyValid) document.getElementById('aiDetectBtn').style.display = '';
    }

    // ===== Thumbnails =====
    function buildThumbnails() {
      const container = document.getElementById('pageThumbs');
      container.innerHTML = '';

      pdfPages.forEach((page, idx) => {
        const thumb = document.createElement('div');
        thumb.className = 'page-thumb' + (idx === 0 ? ' active' : '');
        if (!page.enabled) thumb.classList.add('disabled');
        thumb.onclick = () => goToPage(idx);

        const tc = document.createElement('canvas');
        tc.width = 60;
        tc.height = 80;
        const tctx = tc.getContext('2d');
        tctx.drawImage(page.canvas, 0, 0, 60, 80);
        thumb.appendChild(tc);

        // Detection badge on thumbnail
        const badge = document.createElement('span');
        badge.className = 'thumb-badge' + (page.obiRegion.detected ? '' : ' warn');
        badge.textContent = page.obiRegion.detected ? '✓' : '?';
        thumb.appendChild(badge);

        container.appendChild(thumb);
      });
    }

    // ===== Navigation =====
    function goToPage(idx) {
      currentPage = idx;
      showPreview();
      document.querySelectorAll('.page-thumb').forEach((t, i) => {
        t.classList.toggle('active', i === idx);
      });
    }

    function changePage(delta) {
      const newPage = currentPage + delta;
      if (newPage >= 0 && newPage < totalPages) {
        goToPage(newPage);
      }
    }

    function togglePage() {
      pdfPages[currentPage].enabled = document.getElementById('pageEnabled').checked;
      // Update thumbnail
      const thumbs = document.querySelectorAll('.page-thumb');
      if (thumbs[currentPage]) {
        thumbs[currentPage].classList.toggle('disabled', !pdfPages[currentPage].enabled);
      }
      tryRenderPreview();
    }

    // ===== Show Preview =====
    function showPreview() {
      document.getElementById('previewSection').style.display = 'block';
      document.getElementById('controlsBar').style.display = 'flex';
      document.getElementById('emptyState').style.display = 'none';
      updateStep(3, 'active');

      // Navigation buttons
      document.getElementById('prevBtn').disabled = currentPage <= 0;
      document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
      document.getElementById('pageIndicator').textContent = `${currentPage + 1} / ${totalPages}`;

      const page = pdfPages[currentPage];

      // Per-page settings
      document.getElementById('pageEnabled').checked = page.enabled;

      // Show detection info
      const infoEl = document.getElementById('pageObiInfo');
      const r = page.obiRegion;
      const brokers = page.brokerItems || [];

      if (r.detected) {
        const methodLabel = {
          'box': '📦 ボックス検出',
          'box_irregular': '📦 ボックス検出（変形）',
          'line': '📏 ライン検出',
          'line_irregular': '📏 ライン検出（変形）',
          'text+logo': '🎯 テキスト＋ロゴ',
          'text+logo+img': '🎯 テキスト＋ロゴ＋画像',
          'text+img': '🎯 テキスト＋画像',
          'text': '📝 テキスト検出',
          'text+img': '📝 テキスト＋画像',
          'logo': '🏢 ロゴ検出',
          'image': '🖼️ 画像検出',
          'pixel': '📐 ピクセル検出',
          'pixel_edge': '📐 ピクセルエッジ検出（画像PDF）',
          'pixel_band': '📐 ピクセル帯検出（画像PDF）',
          'ocr_band': '🔍 OCR＋ピクセル帯検出（画像PDF）',
          'ocr_fallback': '🔍 OCRフォールバック（画像PDF）',
          'mid_band': '📐 中央帯検出（2段組）',
          'AI': '🤖 AI検出'
        }[r.method] || r.method;

        let detail = `<span class="detect-badge detected">✓ ${methodLabel}</span> `;
        const widthInfo = (r.isFullWidth === false) ? ` 幅: ${(r.clearLeftPct || 0).toFixed(0)}%〜${(r.clearRightPct || 100).toFixed(0)}%` : '';
        detail += `ゾーン: ${r.clearTopPct.toFixed(0)}%〜${r.clearBottomPct.toFixed(0)}%${widthInfo} `;
        if (r.method === 'AI') {
          const confirmed = (pdfPages[currentPage].aiRedactions || []).length;
          const total = pdfPages[currentPage].totalAiRedactions || confirmed;
          detail += `<span class="detect-badge" style="background:#e8f5e9;color:#2e7d32;">📐 ${AI_DPI}dpi固定座標</span> `;
          detail += `<span class="detect-badge" style="background:#e3f2fd;color:#1565c0;">${confirmed}矩形確定</span>`;
          if (total > confirmed) {
            detail += ` <span class="detect-badge" style="background:#fff3e0;color:#e65100;">⚠ ${total - confirmed}件OCR不確認</span>`;
          }
          detail += `<br><small style="color:#4caf50;">✓ 固定DPI PNG → AI直接ピクセル座標 / マージン±${AI_MARGIN_PX}px自動付加</small>`;
        } else if (r.method === 'ocr_band' || r.method === 'pixel_band' || r.method === 'pixel_edge' || r.method === 'ocr_fallback' || r.method === 'mid_band') {
          // 画像ベースPDFの検出結果
          detail += `<span class="detect-badge" style="background:#f3e5f5;color:#6a1b9a;">🖼️ 画像ベースPDF</span> `;
          if (r.ocrResult) {
            detail += `<span class="detect-badge" style="background:#e8f5e9;color:#2e7d32;">OCRマッチ ${r.ocrResult.matchCount}件</span> `;
            if (r.ocrResult.matchedKeywords && r.ocrResult.matchedKeywords.length > 0) {
              detail += `KW: <strong>${r.ocrResult.matchedKeywords.join(', ')}</strong> `;
            }
          }
          if (r.method === 'pixel_band' || r.method === 'pixel_edge') {
            detail += `<br><small style="color:#999;">※ 色帯/エッジ検出のみ（OCR未確認）</small>`;
          }
        } else {
          if (r.keywords && r.keywords.length > 0) detail += `KW: <strong>${r.keywords.join(', ')}</strong> `;
          if (brokers.length > 0) {
            const reasons = {};
            for (const b of brokers) { reasons[b.reason] = (reasons[b.reason] || 0) + 1; }
            const reasonStr = Object.entries(reasons).map(([k, v]) => `${k}×${v}`).join(', ');
            detail += `<span class="detect-badge" style="background:#fff3e0;color:#e65100;">🔍 ${brokers.length}箇所 (${reasonStr})</span>`;
          }
        }
        infoEl.innerHTML = detail;
      } else {
        const imgBased = r.isImageBased ? ' <span class="detect-badge" style="background:#f3e5f5;color:#6a1b9a;">🖼️ 画像ベースPDF</span>' : '';
        infoEl.innerHTML = `<span class="detect-badge fallback">⚠ 未検出</span>${imgBased} ` +
          `業者情報を自動検出できませんでした`;
      }

      // Update overall detection status in controls bar
      updateDetectStatus();

      // Render original with red highlight boxes on detected broker items
      const origCanvas = document.getElementById('originalCanvas');
      origCanvas.width = page.width;
      origCanvas.height = page.height;
      const ctx = origCanvas.getContext('2d');
      ctx.drawImage(page.canvas, 0, 0);

      if (page.enabled && r.detected) {
        // --- ゾーン境界を表示（ボックス検出時は矩形、それ以外は水平帯） ---
        const zoneY = Math.round(page.height * r.clearTopPct / 100);
        const zoneH = Math.round(page.height * (r.clearBottomPct - r.clearTopPct) / 100);
        const zoneX = Math.round(page.width * (r.clearLeftPct || 0) / 100);
        const zoneW = Math.round(page.width * ((r.clearRightPct || 100) - (r.clearLeftPct || 0)) / 100);

        const isBox = r.method && r.method.startsWith('box');
        const isLine = r.method && r.method.startsWith('line');
        const zoneColor = isBox ? 'rgba(200, 60, 30, 0.08)' : 'rgba(30, 100, 200, 0.06)';
        const borderColor = isBox ? 'rgba(200, 60, 30, 0.5)' : 'rgba(30, 100, 200, 0.35)';

        ctx.fillStyle = zoneColor;
        ctx.fillRect(zoneX, zoneY, zoneW, zoneH);

        if (isBox) {
          // ボックス: 四辺を実線で表示
          ctx.strokeStyle = borderColor;
          ctx.lineWidth = 3;
          ctx.setLineDash([]);
          ctx.strokeRect(zoneX, zoneY, zoneW, zoneH);
        } else if (isLine) {
          // ライン検出: 上端に太い実線
          ctx.strokeStyle = 'rgba(200, 120, 30, 0.7)';
          ctx.lineWidth = 3;
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.moveTo(zoneX, zoneY);
          ctx.lineTo(zoneX + zoneW, zoneY);
          ctx.stroke();
        } else {
          // 従来: 破線
          ctx.strokeStyle = borderColor;
          ctx.lineWidth = 2;
          ctx.setLineDash([8, 4]);
          ctx.beginPath();
          ctx.moveTo(0, zoneY);
          ctx.lineTo(page.width, zoneY);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        // ゾーンラベル
        const methodIcon = isBox ? '📦' : isLine ? '📏' : r.method === 'AI' ? '🤖' : '▼';
        const widthInfo = r.isFullWidth === false ? ` [幅${((r.clearRightPct || 100) - (r.clearLeftPct || 0)).toFixed(0)}%]` : '';
        const zoneLabel = `${methodIcon} ${r.method} ${r.clearTopPct.toFixed(1)}%〜${r.clearBottomPct.toFixed(1)}%${widthInfo}`;
        ctx.font = '16px sans-serif';
        ctx.fillStyle = isBox ? 'rgba(200, 60, 30, 0.8)' : 'rgba(30, 100, 200, 0.7)';
        ctx.fillText(zoneLabel, zoneX + 8, zoneY - 6);

        // --- 業者テキスト要素を個別に赤枠で表示（pdf.js精度） ---
        // ピクセル/OCR検出の場合はテキスト座標が不正確なので個別枠は非表示
        const isPixelOcrMethod = r.method && (r.method.startsWith('pixel') || r.method.startsWith('ocr'));
        if (brokers.length > 0 && !isPixelOcrMethod) {
          // マッチ理由に応じた色分け
          const reasonColors = {
            'anchor': '#d32f2f',      // 赤：強アンカー
            'broker_kw': '#e65100',    // オレンジ：業者KW
            'phone_fp': '#6a1b9a',     // 紫：電話FP
            'company_fp': '#1565c0',   // 青：会社名FP
            'license_fp': '#2e7d32',   // 緑：免許FP
            'email_fp': '#00838f',     // シアン：メールFP
            'email': '#00838f',
            'url_fp': '#37474f',       // ダークグレー：URL
            'url': '#37474f',
            'zipcode_fp': '#4e342e',   // 茶：郵便番号
            'AI': '#7b1fa2',           // 紫：AIテキスト検出
            'AI_visual': '#c62828',    // 濃い赤：AI画像検出
          };

          for (const item of brokers) {
            const color = reasonColors[item.reason] || '#d32f2f';
            const bx = Math.max(0, item.x - 2);
            const by = Math.max(0, item.y - 2);
            const bw = item.w + 4;
            const bh = item.h + 4;

            ctx.fillStyle = color + '1A';
            ctx.fillRect(bx, by, bw, bh);
            ctx.strokeStyle = color + 'CC';
            ctx.lineWidth = 2;
            ctx.strokeRect(bx, by, bw, bh);

            // ラベル（理由 + テキスト抜粋）
            const label = item.reason === 'AI'
              ? `🤖 ${item.text}`
              : item.reason === 'AI_visual'
                ? `🖼️ ${item.text}`
                : `${item.reason}: ${item.text}`;
            ctx.font = '10px sans-serif';
            const tw = Math.min(ctx.measureText(label).width + 6, bw + 100);
            ctx.fillStyle = color + 'DD';
            ctx.fillRect(bx, by - 13, tw, 13);
            ctx.fillStyle = '#ffffff';
            ctx.fillText(label, bx + 3, by - 2);
          }

          // サマリー
          const textCount = brokers.filter(b => b.reason !== 'AI_visual').length;
          const visCount = brokers.filter(b => b.reason === 'AI_visual').length;
          const summaryParts = [];
          if (textCount > 0) summaryParts.push(`テキスト${textCount}件`);
          if (visCount > 0) summaryParts.push(`画像${visCount}件`);
          ctx.font = '14px sans-serif';
          ctx.fillStyle = 'rgba(220, 40, 40, 0.8)';
          ctx.fillText(`🔍 ${summaryParts.join(' + ')} 検出`, 8, zoneY - 6);
        }
      }

      tryRenderPreview();
    }

    function updateDetectStatus() {
      const group = document.getElementById('detectStatusGroup');
      const detected = pdfPages.filter(p => p.obiRegion.detected).length;
      const total = pdfPages.length;

      if (detected === total) {
        group.innerHTML = `<span class="detect-badge detected">✓ 全${total}ページ自動検出</span>`;
      } else {
        group.innerHTML = `<span class="detect-badge detected">✓ ${detected}ページ検出</span>` +
          `<span class="detect-badge fallback">⚠ ${total - detected}ページ手動</span>`;
      }
    }

    // ===== Render Preview (right panel) =====
    function tryRenderPreview() {
      if (!pdfPages.length) return;

      const page = pdfPages[currentPage];
      const resultCanvas = document.getElementById('resultCanvas');
      resultCanvas.width = page.width;
      resultCanvas.height = page.height;
      const ctx = resultCanvas.getContext('2d');

      // Draw original page
      ctx.drawImage(page.canvas, 0, 0);

      if (page.enabled && page.obiRegion.detected) {
        const region = page.obiRegion;
        // 常にゾーン白塗りを実行（全検出方式共通）
        // bboxモードでも個別座標がずれることがあるため、ゾーン白塗りが最も確実
        applyZoneWhiteout(ctx, page.width, page.height,
          region.clearTopPct, region.clearBottomPct,
          region.clearLeftPct, region.clearRightPct);

        // テキスト＋画像要素を個別白塗り（ゾーン外の漏れ要素の補完）
        if (page.brokerItems && page.brokerItems.length > 0) {
          applyBrokerCleanup(ctx, page.brokerItems);
        }
      }

      // Enable download (帯画像不要で常にダウンロード可能)
      document.getElementById('downloadBtn').disabled = false;
    }

    // ===== Generate PDF =====
    async function generatePDF() {
      const btn = document.getElementById('downloadBtn');
      btn.disabled = true;
      btn.textContent = '⏳ 生成中...';

      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      progressBar.style.display = 'block';
      progressFill.style.width = '0%';

      // 少し待ってUIを更新
      await new Promise(r => setTimeout(r, 50));

      const { jsPDF } = window.jspdf;

      const firstPage = pdfPages[0];
      const isLandscape = firstPage.width > firstPage.height;

      const pdf = new jsPDF({
        orientation: isLandscape ? 'landscape' : 'portrait',
        unit: 'px',
        format: [firstPage.width / RENDER_SCALE, firstPage.height / RENDER_SCALE],
        hotfixes: ['px_scaling']
      });

      for (let i = 0; i < pdfPages.length; i++) {
        if (i > 0) {
          const pg = pdfPages[i];
          const isL = pg.width > pg.height;
          pdf.addPage([pg.width / RENDER_SCALE, pg.height / RENDER_SCALE], isL ? 'landscape' : 'portrait');
        }

        const page = pdfPages[i];

        // Create composited canvas
        const compCanvas = document.createElement('canvas');
        compCanvas.width = page.width;
        compCanvas.height = page.height;
        const ctx = compCanvas.getContext('2d');
        ctx.drawImage(page.canvas, 0, 0);

        if (page.enabled && page.obiRegion.detected) {
          const region = page.obiRegion;
          // 常にゾーン白塗りを実行
          applyZoneWhiteout(ctx, page.width, page.height,
            region.clearTopPct, region.clearBottomPct,
            region.clearLeftPct, region.clearRightPct);

          // 個別白塗り（ゾーン外の漏れ補完）
          if (page.brokerItems && page.brokerItems.length > 0) {
            applyBrokerCleanup(ctx, page.brokerItems);
          }
        }

        const imgData = compCanvas.toDataURL('image/jpeg', 0.92);
        pdf.addImage(imgData, 'JPEG', 0, 0, page.width / RENDER_SCALE, page.height / RENDER_SCALE);

        // Update progress
        const pct = Math.round(((i + 1) / pdfPages.length) * 100);
        progressFill.style.width = pct + '%';

        // Yield to UI thread
        await new Promise(r => setTimeout(r, 10));
      }

      // Electron: native save dialog / Browser: direct download
      if (window.electronAPI) {
        const pdfOutput = pdf.output('arraybuffer');
        const savePath = await window.electronAPI.saveFileDialog('マイソク_業者情報削除済.pdf');
        if (savePath) {
          const result = await window.electronAPI.saveFile(savePath, pdfOutput);
          if (result.success) {
            showToast('✓ 保存しました: ' + savePath.split(/[/\\]/).pop());
          } else {
            showToast('❌ 保存エラー: ' + result.error);
          }
        }
      } else {
        pdf.save('マイソク_業者情報削除済.pdf');
        showToast('✓ 業者情報削除済PDFを保存しました');
      }

      btn.disabled = false;
      btn.textContent = '📥 業者情報削除済PDFをダウンロード';
      progressBar.style.display = 'none';
    }

    // ===== Step management =====
    function updateStep(num, state) {
      for (let i = 1; i <= 3; i++) {
        const el = document.getElementById('step' + i);
        el.classList.remove('active', 'done');
      }

      if (document.getElementById('pdfZone').classList.contains('has-file')) {
        document.getElementById('step1').classList.add('done');
      }
      // Step 2 is detection confirmation (done when preview is showing)
      if (pdfPages.length > 0) {
        document.getElementById('step2').classList.add('done');
      }
      if (state === 'active') {
        document.getElementById('step' + num).classList.add('active');
      }

    // ===== AI Detection (GPT-4o / Claude API) =====

    // ===== 固定DPIでレンダリング =====
    async function renderPageAtDpi(page, dpi) {
      const scale = dpi / 72;
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(viewport.width);
      canvas.height = Math.round(viewport.height);
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      return {
        canvas,
        base64: canvas.toDataURL('image/jpeg', 0.90).split(',')[1],
        width: canvas.width,
        height: canvas.height
      };
    }

    // ===== Structured Outputs スキーマ =====
    const AI_JSON_SCHEMA = {
      name: 'redaction_result',
      strict: true,
      schema: {
        type: 'object',
        properties: {
          image_width: { type: 'integer' },
          image_height: { type: 'integer' },
          redactions: {
            type: 'array',
            items: {
              type: 'object',
              properties: {
                x: { type: 'integer' },
                y: { type: 'integer' },
                w: { type: 'integer' },
                h: { type: 'integer' },
                reason: { type: 'string' },
                confidence: { type: 'number' }
              },
              required: ['x', 'y', 'w', 'h', 'reason', 'confidence'],
              additionalProperties: false
            }
          }
        },
        required: ['image_width', 'image_height', 'redactions'],
        additionalProperties: false
      }
    };

    // ===== 通常プロンプト =====

    // ===== ルールzoneクロップ用プロンプト =====
    function buildAiPrompt_zoneCheck(cropW, cropH) {
      return 'この画像は不動産マイソク（物件チラシ）の業者情報エリアを切り抜いたものです。\n'
        + '画像サイズ: ' + cropW + ' x ' + cropH + ' ピクセル\n\n'
        + '【前提】ルールベースシステムがこのエリアを「業者情報帯」として検出しました。\n\n'
        + '【タスク】この画像の中で削除すべき業者情報の正確な位置をピクセル座標で返してください。\n\n'
        + '削除すべき: 会社名・ロゴ・TEL/FAX・メール・URL・住所・免許番号・取引態様・担当者・QRコード・業者背景帯\n\n'
        + '絶対に含めない: 物件概要テーブル・交通アクセス・物件写真・地図・間取り図\n\n'
        + '重要: 迷ったら含めない。confidence を正直に0〜1で返すこと。\n'
        + '業者情報が一切なければ redactions を空配列で返すこと。';

    // ===== AI APIリクエスト =====
    async function callAiApi(base64, imageWidth, imageHeight) {
      return callAiApi_withPrompt(base64, imageWidth, imageHeight, buildAiPrompt(imageWidth, imageHeight));
    }

    async function callAiApi_withPrompt(base64, imageWidth, imageHeight, prompt) {
      const key = document.getElementById('apiKeyInput').value.trim();
      const provider = getAiProvider();

      let res;
      if (provider === 'openai') {
        res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
          body: JSON.stringify({
            model: 'gpt-4o',
            max_tokens: 2048,
            response_format: { type: 'json_schema', json_schema: AI_JSON_SCHEMA },
            messages: [{
              role: 'user',
              content: [
                { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + base64, detail: 'high' } },
                { type: 'text', text: prompt }
              ]
            }]
          })
        });
      } else {
        const tool = {
          name: 'redact_broker_info',
          description: '不動産仲介業者の情報をピクセル座標で返す',
          input_schema: AI_JSON_SCHEMA.schema
        };
        res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-3-5-sonnet-20241022',
            max_tokens: 2048,
            tools: [tool],
            tool_choice: { type: 'tool', name: 'redact_broker_info' },
            messages: [{
              role: 'user',
              content: [
                { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
                { type: 'text', text: prompt }
              ]
            }]
          })
        });
      }

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || 'API Error ' + res.status);
      }
      const data = await res.json();
      if (provider === 'openai') {
        return JSON.parse(data.choices[0].message.content);
      } else {
        const toolUse = data.content.find(function (c) { return c.type === 'tool_use'; });
        if (toolUse) return toolUse.input;
        const textContent = data.content.find(function (c) { return c.type === 'text'; });
        if (textContent) {
          const match = textContent.text.match(/\{[\s\S]*\}/);
          if (match) return JSON.parse(match[0]);
        }
        throw new Error('Claude: JSON応答が取得できませんでした');
      }
    }

    // ===== OCR確認 =====
    const BROKER_OCR_KW = ['TEL', 'FAX', 'tel', 'fax', '免許', '宅建', '取引態様', '媒介', '株式会社', '有限会社', '担当', '仲介', '専任', '手数料', '問い合わせ', '問合せ', '営業時間', '知事', '大臣'];
    const PHONE_RE_OCR = /\d{2,4}[-ー\s]?\d{2,4}[-ー\s]?\d{3,4}/;
    const EMAIL_RE_OCR = /[\w.-]+@[\w.-]+/;

    async function verifyRedactionByOcr(aiCanvas, redaction) {
      if (!ocrReady && !ocrInitializing) await initOcrWorker();
      if (!ocrReady) return { confirmed: true, reason: 'ocr_unavailable' };

      const margin = 30;
      const cx = Math.max(0, redaction.x - margin);
      const cy = Math.max(0, redaction.y - margin);
      const cw = Math.min(aiCanvas.width - cx, redaction.w + margin * 2);
      const ch = Math.min(aiCanvas.height - cy, redaction.h + margin * 2);
      if (cw < 10 || ch < 10) return { confirmed: false, reason: 'too_small' };

      const tmp = document.createElement('canvas');
      tmp.width = cw; tmp.height = ch;
      tmp.getContext('2d').drawImage(aiCanvas, cx, cy, cw, ch, 0, 0, cw, ch);
      try {
        const result = await ocrWorker.recognize(tmp);
        const text = result.data.text || '';
        let matchCount = 0;
        for (const kw of BROKER_OCR_KW) { if (text.includes(kw)) matchCount++; }
        if (PHONE_RE_OCR.test(text)) matchCount++;
        if (EMAIL_RE_OCR.test(text)) matchCount++;
        return { confirmed: matchCount >= 1, matchCount, ocrText: text.substring(0, 100) };
      } catch (e) {
        return { confirmed: true, reason: 'ocr_error' };
      }
    }

    // ===== AI業者情報検出（ルールベースzone活用版） =====
    async function detectBrokerByAI(displayPageData, pageIndex, statusCallback) {
      const pdfPage = await pdfDoc.getPage(pageIndex + 1);

      if (statusCallback) statusCallback('レンダリング中...');
      const aiRender = await renderPageAtDpi(pdfPage, AI_DPI);
      const W = aiRender.width;
      const H = aiRender.height;

      // ルールベースのzone取得
      const ruleObi = pdfPages[pageIndex] && pdfPages[pageIndex].obiRegion;
      const ruleDetected = ruleObi && ruleObi.detected === true
        && ruleObi.clearTopPct !== undefined
        && ruleObi.clearBottomPct !== undefined;

      // クロップゾーン決定
      const cropZones = [];
      const RULE_MARGIN_PX = 60;

      if (ruleDetected) {
        const ruleTopY = Math.max(0, Math.floor(H * (ruleObi.clearTopPct / 100)) - RULE_MARGIN_PX);
        const ruleBotY = Math.min(H, Math.floor(H * (ruleObi.clearBottomPct / 100)) + RULE_MARGIN_PX);
        cropZones.push({ name: 'ルールゾーン', cropY1: ruleTopY, cropY2: ruleBotY, useZonePrompt: true });
        if (statusCallback) statusCallback('ルールベースzone確認中...');
      } else {
        cropZones.push({ name: '下部固定', cropY1: Math.floor(H * 0.60), cropY2: H, useZonePrompt: false });
        if ((H / W) > 1.8) {
          cropZones.push({ name: '中央固定', cropY1: Math.floor(H * 0.35), cropY2: Math.floor(H * 0.65), useZonePrompt: false });
        }
        if (statusCallback) statusCallback('固定ゾーン解析中...');
      }

      const allRedactions = [];

      for (let zi = 0; zi < cropZones.length; zi++) {
        const cz = cropZones[zi];
        const cropY1 = cz.cropY1;
        const cropY2 = cz.cropY2;
        const cropH = cropY2 - cropY1;
        if (cropH < 30) continue;

        if (statusCallback) statusCallback(cz.name + 'を解析中 (' + (zi + 1) + '/' + cropZones.length + ')...');

        const cropCanvas = document.createElement('canvas');
        cropCanvas.width = W;
        cropCanvas.height = cropH;
        cropCanvas.getContext('2d').drawImage(aiRender.canvas, 0, cropY1, W, cropH, 0, 0, W, cropH);
        const cropBase64 = cropCanvas.toDataURL('image/jpeg', 0.93).split(',')[1];

        let apiResult;
        try {
          if (cz.useZonePrompt) {
            apiResult = await callAiApi_withPrompt(cropBase64, W, cropH, buildAiPrompt_zoneCheck(W, cropH));
          } else {
            apiResult = await callAiApi(cropBase64, W, cropH);
          }
        } catch (e) {
          console.warn('Zone[' + cz.name + '] AI失敗:', e.message);
          continue;
        }

        const zoneRedactions = (apiResult && apiResult.redactions || []).map(function (r) {
          return Object.assign({}, r, {
            x: r.x || 0,
            y: (r.y || 0) + cropY1,
            w: r.w || 0,
            h: r.h || 0,
            _zone: cz.name
          });
        });
        allRedactions.push.apply(allRedactions, zoneRedactions);
      }

      if (allRedactions.length === 0) {
        return { zone: null, brokerItems: [], aiRender: aiRender, redactions: [], confirmedCount: 0 };
      }

      // マージン付加
      const withMargin = allRedactions.map(function (r) {
        const nx = Math.max(0, r.x - AI_MARGIN_PX);
        const ny = Math.max(0, r.y - AI_MARGIN_PX);
        const nw = Math.min(W - nx, r.w + AI_MARGIN_PX * 2);
        const nh = Math.min(H - ny, r.h + AI_MARGIN_PX * 2);
        return Object.assign({}, r, { x: nx, y: ny, w: nw, h: nh, confirmed: true });
      });

      // OCR確認
      if (statusCallback) statusCallback('OCR確認中...');
      for (let ri = 0; ri < withMargin.length; ri++) {
        const r = withMargin[ri];
        if ((r.confidence || 1) < 0.85) {
          const ocr = await verifyRedactionByOcr(aiRender.canvas, r);
          r.confirmed = ocr.confirmed;
          r.ocrMatchCount = ocr.matchCount || 0;
        }
      }

      const confirmed = withMargin.filter(function (r) { return r.confirmed; });

      // 表示座標に変換
      const scaleX = displayPageData.width / W;
      const scaleY = displayPageData.height / H;

      const brokerItems = confirmed.map(function (r) {
        return {
          x: Math.round(r.x * scaleX),
          y: Math.round(r.y * scaleY),
          w: Math.round(r.w * scaleX),
          h: Math.round(r.h * scaleY),
          yPct: ((r.y + r.h / 2) / H) * 100,
          text: (r.reason || r._zone || 'AI検出').substring(0, 30),
          reason: 'AI',
          confidence: r.confidence || 1,
          aiX: r.x, aiY: r.y, aiW: r.w, aiH: r.h
        };
      });

      let zone = null;
      if (confirmed.length > 0) {
        const minY = Math.min.apply(null, confirmed.map(function (r) { return r.y; }));
        const maxY = Math.max.apply(null, confirmed.map(function (r) { return r.y + r.h; }));
        zone = {
          top: Math.max(0, (minY / H) * 100 - 0.5),
          bottom: Math.min(100, (maxY / H) * 100 + 0.5)
        };
      }

      return {
        zone: zone,
        brokerItems: brokerItems,
        aiRender: aiRender,
        redactions: confirmed,
        totalAiRedactions: allRedactions.length,
        confirmedCount: confirmed.length,
        usedRuleZone: ruleDetected
      };
    }

    // ===== AI検出結果を pdfPages に適用 =====
    function applyAiResult(i, result) {
      if (result.brokerItems.length === 0 && !result.zone) return false;

      const items = result.brokerItems;
      let clearTop, clearBottom;

      if (result.zone) {
        clearTop = result.zone.top;
        clearBottom = result.zone.bottom;
      } else if (items.length > 0) {
        const minY = Math.min.apply(null, items.map(function (it) { return it.yPct; }));
        const maxY = Math.max.apply(null, items.map(function (it) { return it.yPct; }));
        clearTop = Math.max(0, minY - 3);
        clearBottom = Math.min(100, maxY + 3);
      } else {
        clearTop = 90; clearBottom = 100;
      }

      pdfPages[i].obiRegion = {
        detected: true,
        method: 'AI',
        topPct: clearTop, bottomPct: clearBottom,
        heightPct: clearBottom - clearTop,
        clearTopPct: clearTop, clearBottomPct: clearBottom,
        clearLeftPct: 0, clearRightPct: 100, isFullWidth: true,
        hitCount: items.length,
        keywords: ['AI検出'],
        pixelBoundary: null, textBoundary: null,
        imageBoundary: null, logoBoundary: null
      };

      pdfPages[i].brokerItems = items;
      pdfPages[i].aiRender = result.aiRender;
      pdfPages[i].aiRedactions = result.redactions;
      pdfPages[i].confirmedCount = result.confirmedCount;
      pdfPages[i].totalAiRedactions = result.totalAiRedactions;
      pdfPages[i].bboxMode = true;
      return true;
    }

    // ===== 全ページAI検出（並列処理） =====
    const AI_PARALLEL_MAX = 3;

    async function runAiDetection() {
      if (!apiKeyValid || !pdfPages.length) return;

      const btn = document.getElementById('aiDetectBtn');
      btn.disabled = true;

      let successCount = 0, errorCount = 0, completedCount = 0;
      const total = pdfPages.length;

      const semaphore = { running: 0 };

      function updateBtn() {
        btn.textContent = '🤖 AI検出中... ' + completedCount + '/' + total + ' (並列' + AI_PARALLEL_MAX + ')';
      }
      updateBtn();

      async function processPage(i) {
        while (semaphore.running >= AI_PARALLEL_MAX) {
          await new Promise(function (r) { return setTimeout(r, 100); });
        }
        semaphore.running++;

        function updateStatus(detail) {
          btn.textContent = '🤖 ' + completedCount + '/' + total + ' P' + (i + 1) + ': ' + detail + ' (並列' + semaphore.running + ')';
        }

        try {
          const result = await detectBrokerByAI(pdfPages[i], i, updateStatus);
          if (applyAiResult(i, result)) successCount++;
        } catch (e) {
          console.error('Page ' + (i + 1) + ' AI error:', e);
          errorCount++;
        } finally {
          semaphore.running--;
          completedCount++;
          updateBtn();
        }
      }

      await Promise.all(pdfPages.map(function (_, i) { return processPage(i); }));

      buildThumbnails();
      showPreview();
      btn.disabled = false;
      btn.textContent = '🤖 AI検出を実行';

      if (successCount > 0) document.getElementById('postCheckBtn').style.display = '';

      const totalItems = pdfPages.reduce(function (s, p) { return s + (p.brokerItems ? p.brokerItems.length : 0); }, 0);
      let msg = '✓ AI検出完了: ' + successCount + '/' + total + 'ページ成功 (' + totalItems + '箇所 / ' + AI_DPI + 'dpi固定)';
      if (errorCount > 0) msg += ' / ' + errorCount + 'ページ失敗';
      showToast(msg);
    }

    // ===== 削除後確認（残像チェック） =====
    async function runPostDeletionCheck() {
      if (!apiKeyValid || !pdfPages.length) return;

      const btn = document.getElementById('postCheckBtn');
      btn.disabled = true;
      btn.textContent = '🔍 削除後確認中...';

      let foundCount = 0, checkedCount = 0;

      for (let i = 0; i < pdfPages.length; i++) {
        const page = pdfPages[i];
        if (!page.enabled || !page.obiRegion || !page.obiRegion.detected) continue;
        if (!page.aiRender) continue;

        btn.textContent = '🔍 確認中 ' + (i + 1) + '/' + pdfPages.length + '...';

        try {
          const checkCanvas = document.createElement('canvas');
          checkCanvas.width = page.aiRender.canvas.width;
          checkCanvas.height = page.aiRender.canvas.height;
          const checkCtx = checkCanvas.getContext('2d');
          checkCtx.drawImage(page.aiRender.canvas, 0, 0);

          if (page.brokerItems && page.brokerItems.length > 0) {
            const sx = checkCanvas.width / page.width;
            const sy = checkCanvas.height / page.height;
            for (let ri = 0; ri < page.brokerItems.length; ri++) {
              const r = page.brokerItems[ri];
              checkCtx.fillStyle = '#ffffff';
              checkCtx.fillRect(Math.round((r.x || 0) * sx), Math.round((r.y || 0) * sy), Math.round((r.w || 0) * sx), Math.round((r.h || 0) * sy));
            }
          }

          const base64 = checkCanvas.toDataURL('image/jpeg', 0.85).split(',')[1];
          const result = await callAiApi(base64, checkCanvas.width, checkCanvas.height);
          const remaining = (result && result.redactions) || [];

          if (remaining.length > 0) {
            const scaleX = page.width / checkCanvas.width;
            const scaleY = page.height / checkCanvas.height;
            const newItems = remaining.filter(function (r) { return (r.confidence || 0) >= 0.80; }).map(function (r) {
              return {
                x: Math.round((r.x || 0) * scaleX), y: Math.round((r.y || 0) * scaleY),
                w: Math.round((r.w || 0) * scaleX), h: Math.round((r.h || 0) * scaleY),
                yPct: ((r.y + r.h / 2) / checkCanvas.height) * 100,
                text: ('残像: ' + (r.reason || '')).substring(0, 30),
                reason: 'AI', confidence: r.confidence || 0.8
              };
            });
            if (newItems.length > 0) {
              page.brokerItems = (page.brokerItems || []).concat(newItems);
              foundCount += newItems.length;
            }
          }
          checkedCount++;
        } catch (e) {
          console.warn('Page ' + (i + 1) + ' post-check error:', e.message);
        }
      }

      buildThumbnails();
      showPreview();
      btn.disabled = false;
      btn.textContent = '🔍 削除後確認';
      showToast(foundCount > 0
        ? '🔍 残像確認完了: ' + foundCount + '件の消し漏れを追加検出 (' + checkedCount + 'ページ確認)'
        : '✓ 削除後確認完了: 消し漏れなし (' + checkedCount + 'ページ確認)');
    }



    // ===== Toast =====
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ===== Electron Integration =====
    async function loadPdfFromPath(filePath) {
      if (!window.electronAPI) return;
      const result = await window.electronAPI.readFile(filePath);
      if (!result.success) {
        showToast('❌ ファイル読み込みエラー: ' + result.error);
        return;
      }
      // Create a File-like object from the buffer
      const blob = new Blob([result.data], { type: 'application/pdf' });
      const file = new File([blob], result.name, { type: 'application/pdf' });
      document.getElementById('pdfInfo').textContent = `✓ ${result.name}`;
      document.getElementById('pdfInfo').style.display = 'block';
      document.getElementById('pdfZone').classList.add('has-file');
      updateStep(1, 'done');
      await loadPDF(file);
    }

    // Listen for PDF open from main process (file association / Ctrl+O)
    if (window.electronAPI) {
      window.electronAPI.onOpenPdf((filePath) => {
        loadPdfFromPath(filePath);
      });

      // Also enhance the upload zone to use native dialog on click
      document.getElementById('pdfZone').addEventListener('click', async (e) => {
        // Only intercept if not clicking on the file input itself
        if (e.target.id === 'pdfInput') return;
        e.preventDefault();
        e.stopPropagation();
        const filePath = await window.electronAPI.openFileDialog();
        if (filePath) {
          loadPdfFromPath(filePath);
        }
      }, true);

      // Hide the HTML file input in Electron mode (use native dialog)
      document.getElementById('pdfInput').style.display = 'none';
    }
  </script>
